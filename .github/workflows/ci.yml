name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
      - labeled
      - unlabeled
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci_tests: ${{ steps.filter.outputs.ci_tests }}
      android_runtime: ${{ steps.filter.outputs.android_runtime }}
      android_instrumented: ${{ steps.filter.outputs.android_instrumented }}
      lifecycle_high_risk_paths: ${{ steps.filter.outputs.lifecycle_high_risk_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            ci_tests:
              - "apps/**"
              - "packages/**"
              - "tools/**"
              - "scripts/**"
              - "tests/maestro/**"
              - "tests/maestro-cloud/**"
              - "config/**"
              - "settings.gradle.kts"
              - "build.gradle.kts"
              - "**/*.gradle"
              - "**/*.gradle.kts"
              - ".github/workflows/ci.yml"
            android_runtime:
              - "apps/mobile-android/**"
              - "apps/mobile-android-baselineprofile/**"
              - "packages/**"
              - "tools/devctl/**"
              - "scripts/android/**"
              - "scripts/ci/**"
              - "scripts/benchmarks/**"
              - "scripts/dev/perf-interaction*.sh"
              - "config/devctl/**"
              - "third_party/llama.cpp/**"
              - ".gitmodules"
            android_instrumented:
              - "apps/mobile-android/**"
              - "packages/**"
              - "tools/devctl/**"
              - "config/devctl/**"
              - ".github/workflows/ci.yml"
            lifecycle_high_risk_paths:
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/runtime/**"
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/ui/**"
              - "packages/app-runtime/**"
              - "packages/native-bridge/**"
              - "scripts/ci/run_lifecycle_e2e.sh"
              - "tests/maestro/scenario-first-run-download-chat.yaml"
              - "tests/maestro/shared/**"
              - "tests/maestro-cloud/shared/**"
              - ".github/workflows/ci.yml"

  lifecycle-risk:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Classify lifecycle E2E risk
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          PATH_RISK: ${{ needs.changes.outputs.lifecycle_high_risk_paths }}
        run: |
          set -euo pipefail
          should_run=false
          label_risk=false
          reasons=()
          event_json_path="${GITHUB_EVENT_PATH:-}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -n "${event_json_path}" && -f "${event_json_path}" ]]; then
              if jq -e '.pull_request.labels[]?.name | select(. == "risk:e2e-lifecycle" or . == "risk:runtime" or . == "risk:provisioning")' "${event_json_path}" >/dev/null; then
                label_risk=true
              fi
            else
              echo "::warning::GITHUB_EVENT_PATH is unavailable; skipping label risk detection."
            fi
          fi

          if [[ "${EVENT_NAME}" == "push" && "${REF_NAME}" == "main" ]]; then
            should_run=true
            reasons+=("main-push")
          fi

          if [[ "${PATH_RISK}" == "true" ]]; then
            should_run=true
            reasons+=("high-risk-path")
          fi

          if [[ "${label_risk}" == "true" ]]; then
            should_run=true
            reasons+=("risk-label")
          fi

          if [[ ${#reasons[@]} -eq 0 ]]; then
            reasons+=("low-risk-change")
          fi

          reason="$(IFS=,; echo "${reasons[*]}")"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "Lifecycle E2E gate decision: should_run=${should_run} reason=${reason}"

  pr-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Validate PR template completion
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance validate-pr-body /tmp/pr-body.md

      - name: Stage-close evidence gate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance stage-close-gate /tmp/pr-body.md

      - name: Validate changed evidence references
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python3 tools/devctl/main.py governance evidence-check-changed --event-name "$GITHUB_EVENT_NAME" --base-ref "$GITHUB_BASE_REF"

  docs-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Docs drift guard
        run: python3 tools/devctl/main.py governance docs-drift

      - name: Docs health guard
        run: python3 tools/devctl/main.py governance docs-health

      - name: Docs accuracy guard
        run: python3 tools/devctl/main.py governance docs-accuracy

      - name: Governance self-tests
        run: python3 tools/devctl/main.py governance self-test

  unit-and-host-tests:
    needs: changes
    if: needs.changes.outputs.ci_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          # Unit/host tests compile Android code but do not boot an emulator.
          # Avoid the action default package set, which may download emulator payloads.
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Configure Android SDK env
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Test (devctl canonical lane)
        run: python3 tools/devctl/main.py lane test ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-and-static-analysis-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/reports/detekt/**
            **/build/reports/ktlint/**
          if-no-files-found: warn

  android-lint:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: bash scripts/ci/install_android_sdk_components.sh "ndk;27.0.12077973"

      - name: Android lint
        run: ./gradlew --no-daemon :apps:mobile-android:lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          if-no-files-found: warn

  native-build-package-check:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap vendored llama.cpp
        run: bash scripts/ci/bootstrap_llama_vendor.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install native Android SDK components
        run: bash scripts/ci/install_android_sdk_components.sh "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Assemble benchmark APK with native build enabled
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleBenchmark

      - name: Verify benchmark APK packages native library
        run: |
          set -euo pipefail
          apk_path="apps/mobile-android/build/outputs/apk/benchmark/mobile-android-benchmark.apk"
          if [[ ! -f "${apk_path}" ]]; then
            echo "No benchmark APK produced at ${apk_path}" >&2
            exit 1
          fi
          echo "Inspecting APK: ${apk_path}"
          unzip -Z1 "${apk_path}" > benchmark-apk-entries.txt
          if ! grep -Fxq 'lib/arm64-v8a/libpocket_llama.so' benchmark-apk-entries.txt; then
            echo "Missing lib/arm64-v8a/libpocket_llama.so in ${apk_path}" >&2
            exit 1
          fi

      - name: Verify benchmark APK packages the generated Baseline Profile
        run: |
          python3 scripts/dev/android_perf_harness.py assert-application-id \
            --metadata apps/mobile-android/build/intermediates/packaged_manifests/benchmark/processBenchmarkManifestForPackage/output-metadata.json \
            --expected com.pocketagent.android.benchmark
          python3 scripts/benchmarks/verify_android_baseline_profile.py \
            --apk apps/mobile-android/build/outputs/apk/benchmark/mobile-android-benchmark.apk \
            --generated-profile apps/mobile-android/src/main/generated/baselineProfiles/baseline-prof.txt \
            --merged-profile apps/mobile-android/build/intermediates/combined_art_profile/benchmark/compileBenchmarkArtProfile/baseline-prof.txt \
            --json-output benchmark-baseline-profile-verification.json

  android-instrumented-smoke:
    needs: changes
    if: needs.changes.outputs.android_instrumented == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free disk before instrumentation emulator
        run: |
          set -euo pipefail
          echo "Disk before instrumentation emulator cleanup:"
          df -h

          # The API 33 Pixel 6 AVD needs more free space than the hosted runner
          # currently leaves after Android setup. Remove unrelated toolchains so
          # emulator startup cannot fail while creating its userdata partition.
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

          echo "Disk after instrumentation emulator cleanup:"
          df -h

      - name: Run instrumentation smoke suite on emulator (attempt 1)
        id: instrumented_attempt_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: |
            ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.MainActivityUiSmokeTest#onboardingFlowCanProgressAndComplete :apps:mobile-android:connectedDebugAndroidTest
            ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.ui.ModelManagementSheetComposeContractTest :apps:mobile-android:connectedDebugAndroidTest

      - name: Run instrumentation smoke suite on emulator (attempt 2)
        id: instrumented_attempt_2
        if: steps.instrumented_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: |
            ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.MainActivityUiSmokeTest#onboardingFlowCanProgressAndComplete :apps:mobile-android:connectedDebugAndroidTest
            ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.ui.ModelManagementSheetComposeContractTest :apps:mobile-android:connectedDebugAndroidTest

      - name: Enforce instrumentation success after bounded retry
        if: always()
        run: |
          set -euo pipefail
          first="${{ steps.instrumented_attempt_1.outcome }}"
          second="${{ steps.instrumented_attempt_2.outcome || 'skipped' }}"
          if [[ "${first}" == "success" || "${second}" == "success" ]]; then
            echo "Instrumentation smoke passed (first=${first}, second=${second})."
            exit 0
          fi
          echo "::error::Instrumentation smoke failed after bounded retry (first=${first}, second=${second})."
          exit 1

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-instrumented-smoke-reports
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  lifecycle-e2e-first-run:
    name: lifecycle-e2e-first-run
    needs:
      - lifecycle-risk
    if: needs.lifecycle-risk.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap vendored llama.cpp
        run: bash scripts/ci/bootstrap_llama_vendor.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Install native Android SDK components
        run: bash scripts/ci/install_android_sdk_components.sh "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Assemble debug APK
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true -Ppocketgpt.nativeAbiFilters=x86_64 :apps:mobile-android:assembleDebug

      - name: Free disk before lifecycle emulator
        run: |
          set -euo pipefail
          echo "Disk before lifecycle emulator cleanup:"
          df -h

          # The lifecycle job builds the native x86_64 APK before the emulator
          # action installs an API 33 system image. Keep only the packaged APK
          # and remove build/cache payloads that are no longer needed.
          rm -rf "${ANDROID_HOME}/ndk" "${ANDROID_HOME}/cmake"
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          rm -rf "${HOME}/.gradle/caches" "${HOME}/.gradle/daemon" "${HOME}/.gradle/native" "${HOME}/.gradle/workers"
          find packages -type d -name build -prune -exec rm -rf '{}' +
          find apps -mindepth 2 -type d -name build ! -path 'apps/mobile-android/build' -prune -exec rm -rf '{}' +
          rm -rf build
          find apps/mobile-android/build -mindepth 1 -maxdepth 1 ! -name outputs -exec rm -rf '{}' +
          find apps/mobile-android/build/outputs -mindepth 1 -maxdepth 1 ! -name apk -exec rm -rf '{}' +
          find apps/mobile-android/build/outputs/apk -mindepth 1 -maxdepth 1 ! -name debug -exec rm -rf '{}' +

          echo "Disk after lifecycle emulator cleanup:"
          df -h

      - name: Run first-run lifecycle E2E with bounded script retry
        id: lifecycle_run
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: bash scripts/ci/run_lifecycle_e2e.sh "${{ needs.lifecycle-risk.outputs.reason }}"

      - name: Summarize lifecycle crash signatures
        if: always()
        run: |
          set -euo pipefail
          summary="${GITHUB_STEP_SUMMARY}"
          echo "## Lifecycle Crash Signature Summary" >> "${summary}"
          echo "" >> "${summary}"

          shopt -s nullglob
          crash_files=(tmp/lifecycle-e2e-first-run/attempt-*/crash-signatures.txt)
          if [[ ${#crash_files[@]} -eq 0 ]]; then
            echo "- No crash-signature artifacts were generated." >> "${summary}"
            exit 0
          fi

          found="false"
          for file in "${crash_files[@]}"; do
            if [[ ! -s "${file}" ]]; then
              continue
            fi
            found="true"
            attempt="$(basename "$(dirname "${file}")")"
            echo "### ${attempt}" >> "${summary}"
            echo "" >> "${summary}"
            echo '```text' >> "${summary}"
            sed -n '1,200p' "${file}" >> "${summary}"
            if [[ $(wc -l < "${file}") -gt 200 ]]; then
              echo "... (truncated to first 200 lines)" >> "${summary}"
            fi
            echo '```' >> "${summary}"
            echo "" >> "${summary}"
          done

          if [[ "${found}" != "true" ]]; then
            echo "- No app crash signatures detected in lifecycle attempts." >> "${summary}"
          fi

      - name: Upload lifecycle E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lifecycle-e2e-first-run-artifacts
          path: |
            tmp/lifecycle-e2e-first-run/**
          if-no-files-found: warn

  ci-required:
    name: ci-required
    needs:
      - changes
      - lifecycle-risk
      - pr-governance
      - docs-drift
      - unit-and-host-tests
      - android-lint
      - native-build-package-check
      - android-instrumented-smoke
      - lifecycle-e2e-first-run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce required CI semantics
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          LIFECYCLE_RISK_RESULT: ${{ needs.lifecycle-risk.result }}
          PR_GOVERNANCE_RESULT: ${{ needs.pr-governance.result }}
          DOCS_DRIFT_RESULT: ${{ needs.docs-drift.result }}
          CI_TESTS_REQUIRED: ${{ needs.changes.outputs.ci_tests }}
          UNIT_AND_HOST_RESULT: ${{ needs.unit-and-host-tests.result }}
          ANDROID_RUNTIME_REQUIRED: ${{ needs.changes.outputs.android_runtime }}
          ANDROID_LINT_RESULT: ${{ needs.android-lint.result }}
          NATIVE_BUILD_RESULT: ${{ needs.native-build-package-check.result }}
          ANDROID_INSTRUMENTED_REQUIRED: ${{ needs.changes.outputs.android_instrumented }}
          ANDROID_INSTRUMENTED_RESULT: ${{ needs.android-instrumented-smoke.result }}
          LIFECYCLE_REQUIRED: ${{ needs.lifecycle-risk.outputs.should_run }}
          LIFECYCLE_RESULT: ${{ needs.lifecycle-e2e-first-run.result }}
        run: |
          set -euo pipefail

          failures=()
          notices=()

          require_success() {
            local name="$1"
            local result="$2"
            if [[ "${result}" != "success" ]]; then
              failures+=("${name}=${result}")
            fi
          }

          require_when() {
            local name="$1"
            local required="$2"
            local result="$3"
            if [[ "${required}" == "true" ]]; then
              require_success "${name}" "${result}"
            else
              if [[ "${result}" == "skipped" ]]; then
                notices+=("${name}=skipped-by-policy")
              elif [[ "${result}" == "success" ]]; then
                notices+=("${name}=ran-despite-low-risk")
              else
                failures+=("${name}=${result} (expected skip or success for required=${required})")
              fi
            fi
          }

          require_success "changes" "${CHANGES_RESULT}"
          require_success "lifecycle-risk" "${LIFECYCLE_RISK_RESULT}"
          require_success "docs-drift" "${DOCS_DRIFT_RESULT}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            require_success "pr-governance" "${PR_GOVERNANCE_RESULT}"
          elif [[ "${PR_GOVERNANCE_RESULT}" == "skipped" ]]; then
            notices+=("pr-governance=skipped-non-pr")
          else
            failures+=("pr-governance=${PR_GOVERNANCE_RESULT} (expected skipped for ${EVENT_NAME})")
          fi

          require_when "unit-and-host-tests" "${CI_TESTS_REQUIRED}" "${UNIT_AND_HOST_RESULT}"
          require_when "android-lint" "${ANDROID_RUNTIME_REQUIRED}" "${ANDROID_LINT_RESULT}"
          require_when "native-build-package-check" "${ANDROID_RUNTIME_REQUIRED}" "${NATIVE_BUILD_RESULT}"
          require_when "android-instrumented-smoke" "${ANDROID_INSTRUMENTED_REQUIRED}" "${ANDROID_INSTRUMENTED_RESULT}"
          require_when "lifecycle-e2e-first-run" "${LIFECYCLE_REQUIRED}" "${LIFECYCLE_RESULT}"

          {
            echo "## Required CI Summary"
            echo ""
            echo "- event: \`${EVENT_NAME}\`"
            echo "- ci_tests_required: \`${CI_TESTS_REQUIRED}\`"
            echo "- android_runtime_required: \`${ANDROID_RUNTIME_REQUIRED}\`"
            echo "- android_instrumented_required: \`${ANDROID_INSTRUMENTED_REQUIRED}\`"
            echo "- lifecycle_required: \`${LIFECYCLE_REQUIRED}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ ${#notices[@]} -gt 0 ]]; then
            printf -- '- %s\n' "${notices[@]}" >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [[ ${#failures[@]} -gt 0 ]]; then
            printf 'Required CI failure(s): %s\n' "${failures[*]}" >&2
            printf -- '- failure: %s\n' "${failures[@]}" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          echo "Required CI semantics passed."
