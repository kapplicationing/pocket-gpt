name: Nightly Validation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-emulator-instrumented:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run nightly instrumentation smoke matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false :apps:mobile-android:connectedDebugAndroidTest

      - name: Upload nightly instrumentation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-instrumented-reports-api-${{ matrix.api-level }}
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  nightly-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Run Maestro nightly smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: bash scripts/ci/run_nightly_maestro_smoke.sh "api-${{ matrix.api-level }}"

      - name: Upload nightly Maestro smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-maestro-smoke-api-${{ matrix.api-level }}
          path: |
            tmp/nightly-maestro-smoke/api-${{ matrix.api-level }}/**
          if-no-files-found: warn

  nightly-maestro-first-run:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap vendored llama.cpp
        run: bash scripts/ci/bootstrap_llama_vendor.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Assemble debug APK
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true -Ppocketgpt.nativeAbiFilters=x86_64 :apps:mobile-android:assembleDebug

      - name: Run first-run lifecycle flow on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: LIFECYCLE_E2E_OUT_DIR="tmp/nightly-maestro-first-run/api-${{ matrix.api-level }}" bash scripts/ci/run_lifecycle_e2e.sh "nightly-api-${{ matrix.api-level }}"

      - name: Upload nightly Maestro first-run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-maestro-first-run-api-${{ matrix.api-level }}
          path: |
            tmp/nightly-maestro-first-run/api-${{ matrix.api-level }}/**
          if-no-files-found: warn

  nightly-maestro-cloud-first-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap vendored llama.cpp
        run: bash scripts/ci/bootstrap_llama_vendor.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Skip when Maestro Cloud key is missing
        run: |
          if [[ -z "${MAESTRO_CLOUD_API_KEY}" ]]; then
            echo "MAESTRO_CLOUD_API_KEY is not configured; skipping cloud supplemental nightly flow."
            echo "Maestro Cloud key missing; cloud supplemental coverage skipped by configuration." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

      - name: Assemble debug APK
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Resolve debug APK
        id: debug_apk
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: |
          set -euo pipefail
          APK_PATH="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No debug APK found under apps/mobile-android/build/outputs/apk/debug" >&2
            exit 1
          fi
          echo "path=${APK_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Run first-run lifecycle flow on Maestro Cloud
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: |
          set -euo pipefail
          bash scripts/dev/maestro-cloud-flow.sh \
            --flow tests/maestro/scenario-first-run-download-chat.yaml \
            --no-build \
            --app-file "${{ steps.debug_apk.outputs.path }}" \
            --api-level 34 \
            --api-key-env MAESTRO_CLOUD_API_KEY \
            --run-root tmp/nightly-maestro-cloud-first-run

      - name: Run model-management split smoke on Maestro Cloud
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: |
          set -euo pipefail
          bash scripts/dev/maestro-cloud-smoke.sh \
            --no-build \
            --api-level 34 \
            --api-key-env MAESTRO_CLOUD_API_KEY \
            --run-root tmp/nightly-maestro-cloud-model-management

      - name: Upload nightly Maestro cloud artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-maestro-cloud-first-run
          path: |
            tmp/nightly-maestro-cloud-first-run/**
            tmp/nightly-maestro-cloud-model-management/**
          if-no-files-found: warn
