// Compose stability configuration for the PocketGPT app module.
//
// This file tells the Compose compiler which classes are stable for
// strong-skipping. A type listed here is treated as stable; composables that
// receive it as a parameter can be skipped when the reference is unchanged.
//
// Maintenance rules (enforced by PerformanceContractAuditTest):
//  - Add a type ONLY if its public surface is effectively immutable (no `var`,
//    no mutable collections held internally, deterministic equals).
//  - Prefer @Immutable on the class definition; this file is a backstop for
//    types we do not own (Kotlin stdlib, library types) or for stable enums
//    we want to keep listed for clarity.
//  - Any new UI state class introduced under com.pocketagent.android.ui.state
//    must either be @Immutable or appear here. The audit test will fail
//    otherwise.
//
// DO NOT add framework Context, Coroutine scopes, or ViewModels here. Those
// are intentionally unstable; instead, hoist their data into stable holders
// and consume via CompositionLocal where possible.

// Kotlin stdlib collections.
// Compose's strong-skipping treats kotlin.collections.List/Set/Map as
// unstable by default because the interfaces don't guarantee immutability.
// In PocketGPT we use them in a read-only way at the Compose boundary
// (ViewModels emit fresh List<X> via state.copy(...)), so the practical
// stability invariant holds. Listing them here removes ~10 unstable
// parameter sites flagged in compose-reports/*-composables.txt.
kotlin.collections.List
kotlin.collections.Set
kotlin.collections.Map
kotlin.collections.Collection

