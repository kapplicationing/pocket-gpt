appId: com.pocketagent.android
tags:
  - cloud-fixture
  - model-management
  - hf-fixture
  - downloads
---
- runFlow: shared/bootstrap-cloud-startup.yaml
- runFlow: shared/open-model-library.yaml

- assertVisible: "Model library"
- assertVisible:
    id: "model_library_add_hugging_face"
- tapOn:
    id: "model_library_hf_search_input"
- eraseText
- inputText: "tiny"
- hideKeyboard
- tapOn:
    id: "model_library_hf_search_button"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_search_results"
    timeout: 30000
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- tapOn:
    id: "model_library_hf_search_use_file"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_candidate_card"
    timeout: 30000
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- scrollUntilVisible:
    element:
      id: "model_library_hf_queue_download"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_queue_download"
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue"
    direction: DOWN
    timeout: 30000
- assertVisible:
    id: "model_library_download_queue"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_pause"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_pause"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_resume"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_resume"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_pause"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_cancel"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_retry"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_retry"
- extendedWaitUntil:
    visible:
      text: "fixture/tiny-gguf / tiny.gguf"
    timeout: 180000
- assertVisible: "Load"
- takeScreenshot: "cloud-hf-fixture-download-installed"
