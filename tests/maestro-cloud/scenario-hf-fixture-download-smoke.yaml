appId: com.pocketagent.android
tags:
  - cloud-fixture
  - model-management
  - hf-fixture
  - downloads
---
- runFlow: shared/bootstrap-cloud-startup.yaml
- runFlow: shared/open-model-library.yaml

- assertVisible: "Model library"
- assertVisible:
    id: "model_library_add_hugging_face"
- tapOn:
    id: "model_library_hf_search_input"
- eraseText
- inputText: "tiny"
- hideKeyboard
- tapOn:
    id: "model_library_hf_search_button"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_search_results"
    timeout: 30000
- assertVisible: "Repo: fixture/tiny-gguf"
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- assertVisible: "File: tiny.gguf"
- assertVisible: "Downloads: 42 | Likes: 7 | License: apache-2.0"
- tapOn: "Check this file"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_candidate_card"
    timeout: 30000
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- scrollUntilVisible:
    element:
      id: "model_library_hf_queue_download"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_queue_download"
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 60000
- tapOn: "Pause"
- scrollUntilVisible:
    element:
      text: "Resume"
    direction: DOWN
    timeout: 60000
- tapOn: "Resume"
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 60000
- tapOn: "Cancel"
- scrollUntilVisible:
    element:
      text: "Retry"
    direction: DOWN
    timeout: 60000
- tapOn: "Retry"
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 60000
- extendedWaitUntil:
    notVisible:
      text: "Pause"
    timeout: 180000
- extendedWaitUntil:
    visible:
      text: "fixture/tiny-gguf / tiny.gguf"
    timeout: 180000
- assertVisible: "Load"
- takeScreenshot: "cloud-hf-fixture-download-installed"
