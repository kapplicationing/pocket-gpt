appId: com.pocketagent.android
tags:
  - cloud-fixture
  - model-management
  - hf-candidate
---
- runFlow: shared/open-model-library-debug.yaml

- scrollUntilVisible:
    element:
      id: "model_library_hf_url_input"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_url_input"
- eraseText
- inputText: "https://huggingface.co/fixture/tiny-gguf/resolve/main/tiny.gguf"
- hideKeyboard
- tapOn:
    id: "model_library_hf_check_url"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_candidate_card"
    timeout: 30000
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- assertVisible:
    id: "model_library_hf_queue_download"
- takeScreenshot: "cloud-hf-url-to-candidate"
