appId: com.pocketagent.android
tags:
  - cloud-smoke
  - model-management
  - hf-validation
---
# Cloud uses the deterministic launch hook to avoid a hosted keyboard/tap race.
# The local Maestro counterpart keeps the full input interaction coverage.
- launchApp:
    clearState: true
    arguments:
      android.intent.action: "com.pocketagent.android.DEBUG_OPEN_MODEL_LIBRARY"
      pocketagent.debug.skip_onboarding: "true"
      pocketagent.debug.open_surface: "model_library"
      pocketagent.debug.clear_recent_hf: "true"
      pocketagent.debug.hf_resolve_url: "https://example.test/owner/repo/resolve/main/model.gguf"
- extendedWaitUntil:
    visible:
      id: "debug_model_library_ready"
    timeout: 30000
- runFlow: shared/open-model-library-advanced-sources.yaml
- extendedWaitUntil:
    visible:
      id: "debug_model_library_status_blocked_invalid_url"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "model_library_hf_error"
    direction: DOWN
    timeout: 20000
- assertNotVisible:
    id: "model_library_hf_candidate_card"
- takeScreenshot: "cloud-hf-url-validation-blocked"
