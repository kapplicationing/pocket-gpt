appId: com.pocketagent.android
tags:
  - cloud-smoke
  - model-management
---
- runFlow: shared/bootstrap-cloud-startup.yaml
- runFlow: shared/open-model-library.yaml
- assertVisible: "Model library"
- assertVisible: "Search models"
- assertVisible: "Downloaded models"
- scrollUntilVisible:
    element:
      text: "Available models"
    direction: DOWN
    timeout: 20000
- assertVisible: "Available models"
- assertVisible: "Refresh"
- scrollUntilVisible:
    element:
      text: "Close"
    direction: DOWN
    timeout: 20000
- assertVisible: "Close"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- takeScreenshot: "cloud-model-management-unified-library"
