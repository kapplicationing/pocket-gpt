appId: com.pocketagent.android
tags:
  - cloud-smoke
  - model-management
---
- runFlow: shared/open-model-library-debug.yaml
- takeScreenshot: "cloud-model-management-library-opened"
- assertVisible: "Model library"
- assertVisible:
    id: "model_library_tab_my_models"
- assertVisible: "Refresh"
- scrollUntilVisible:
    element:
      text: "Ready on this device"
    direction: DOWN
    timeout: 20000
- assertVisible: "Ready on this device"
- scrollUntilVisible:
    element:
      id: "model_library_tab_explore"
    direction: UP
    timeout: 20000
- tapOn:
    id: "model_library_tab_explore"
- assertVisible: "Search models"
- assertVisible: "Available models"
- scrollUntilVisible:
    element:
      text: "Close"
    direction: DOWN
    timeout: 20000
- assertVisible: "Close"
- assertNotVisible: "Use now"
- assertNotVisible: "Offload"
- takeScreenshot: "cloud-model-management-unified-library"
