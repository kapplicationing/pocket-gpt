appId: com.pocketagent.android
tags:
  - cloud-smoke
  - model-management
---
- runFlow: shared/bootstrap-cloud-startup.yaml
- extendedWaitUntil:
    visible:
      id: "open_model_library"
    timeout: 30000
- tapOn:
    id: "open_model_library"
- runFlow:
    when:
      notVisible: "Model library"
    commands:
      - extendedWaitUntil:
          visible: "More models…"
          timeout: 10000
      - tapOn: "More models…"
- assertVisible: "Model library"
- assertVisible: "Search models"
- assertVisible: "Downloaded models"
- scrollUntilVisible:
    element:
      text: "Available models"
    direction: DOWN
    timeout: 20000
- assertVisible: "Available models"
- assertVisible: "Refresh"
- scrollUntilVisible:
    element:
      text: "Close"
    direction: DOWN
    timeout: 20000
- assertVisible: "Close"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- takeScreenshot: "cloud-model-management-unified-library"
