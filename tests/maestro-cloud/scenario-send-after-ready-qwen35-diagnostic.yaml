appId: com.pocketagent.android
tags:
  - cloud-diagnostic
  - cloud-send
  - send
---
- runFlow: shared/bootstrap-cloud-startup.yaml
- runFlow: shared/open-model-library.yaml
- tapOn:
    id: "model_library_tab_explore"
- tapOn: "Search models"
- eraseText
- inputText: "qwen3.5-0.8b-q4"
- hideKeyboard
- runFlow:
    when:
      visible:
        id: 'model_library_download_qwen3\.5-0\.8b-q4_q4_0'
        enabled: true
    commands:
      - tapOn:
          id: 'model_library_download_qwen3\.5-0\.8b-q4_q4_0'
      - runFlow:
          when:
            visible: "Large download on metered network"
          commands:
            - tapOn: "Continue download"
      - extendedWaitUntil:
          notVisible:
            id: 'model_library_download_qwen3\.5-0\.8b-q4_q4_0'
            enabled: true
          timeout: 300000
- runFlow:
    when:
      visible: "Queuing…"
    commands:
      - extendedWaitUntil:
          notVisible: "Queuing…"
          timeout: 300000
- runFlow:
    when:
      visible: "Pause"
    commands:
      - extendedWaitUntil:
          notVisible: "Pause"
          timeout: 300000
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- scrollUntilVisible:
    element:
      id: "model_library_tab_my_models"
    direction: UP
    timeout: 20000
- tapOn:
    id: "model_library_tab_my_models"
- runFlow:
    when:
      visible: "Model library"
    commands:
      - scrollUntilVisible:
          element:
            text: "Ready on this device"
          direction: DOWN
          timeout: 20000
- runFlow:
    when:
      visible: "Refresh"
    commands:
      - tapOn: "Refresh"
- runFlow:
    when:
      visible:
        id: 'model_library_load_qwen3\.5-0\.8b-q4_q4_0'
        enabled: true
    commands:
      - tapOn:
          id: 'model_library_load_qwen3\.5-0\.8b-q4_q4_0'
- runFlow:
    when:
      visible: "Model library"
    commands:
      - back
- extendedWaitUntil:
    visible:
      id: "composer_input"
    timeout: 180000
- extendedWaitUntil:
    notVisible:
      id: "chat_gate_inline_card"
    timeout: 180000
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "Reply with exactly: SEND_AFTER_READY_OK"
- hideKeyboard
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
      enabled: true
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Retry"
    timeout: 180000
- tapOn:
    id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "cloud-send-after-ready-qwen35-diagnostic"
