appId: com.pocketagent.android
tags:
  - cloud-send
  - send
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "Reply with exactly: SEND_AFTER_READY_OK"
- tapOn:
    id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
    timeout: 30000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "cloud-send-after-ready"
