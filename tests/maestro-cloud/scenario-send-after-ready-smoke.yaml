appId: com.pocketagent.android
tags:
  - cloud-send
  - send
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "Reply with exactly: SEND_AFTER_READY_OK"
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
      enabled: true
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Retry"
    timeout: 180000
- tapOn:
    id: "send_button"
- runFlow:
    when:
      visible: "Loading…"
    commands:
      - extendedWaitUntil:
          notVisible: "Loading…"
          timeout: 180000
      - extendedWaitUntil:
          visible:
            id: "send_button"
            enabled: true
          timeout: 180000
      - extendedWaitUntil:
          notVisible: "Retry"
          timeout: 180000
      - tapOn:
          id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "cloud-send-after-ready"
