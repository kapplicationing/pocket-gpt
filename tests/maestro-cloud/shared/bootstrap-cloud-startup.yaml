appId: com.pocketagent.android
---
- launchApp:
    clearState: true
- runFlow:
    when:
      notVisible: "Pocket GPT"
    commands:
      - extendedWaitUntil:
          visible: "Welcome"
          timeout: 20000
- runFlow:
    when:
      notVisible: "Welcome"
    commands:
      - extendedWaitUntil:
          visible: "Pocket GPT"
          timeout: 20000
- runFlow:
    when:
      visible:
        id: "onboarding_skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible:
        text: "Skip"
    commands:
      - tapOn:
          text: "Skip"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_get_started"
    commands:
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible:
        text: "Get started"
    commands:
      - tapOn:
          text: "Get started"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
