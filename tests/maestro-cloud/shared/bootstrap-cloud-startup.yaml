appId: com.pocketagent.android
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: bootstrap-clean-start.yaml
- runFlow: complete-first-run-onboarding.yaml
- runFlow: dismiss-system-overlays.yaml
- extendedWaitUntil:
    visible:
      id: "session_drawer_button"
    timeout: 30000
