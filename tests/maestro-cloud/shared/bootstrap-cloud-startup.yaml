appId: com.pocketagent.android
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- extendedWaitUntil:
    visible: "Next"
    timeout: 20000
- runFlow:
    when:
      visible:
        id: "onboarding_skip"
    commands:
      - hideKeyboard
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible:
        text: "Skip"
    commands:
      - hideKeyboard
      - tapOn:
          text: "Skip"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - hideKeyboard
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - hideKeyboard
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - hideKeyboard
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - hideKeyboard
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_get_started"
    commands:
      - hideKeyboard
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible:
        text: "Get started"
    commands:
      - hideKeyboard
      - tapOn:
          text: "Get started"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 20000
- runFlow: ensure-runtime-loaded.yaml
- extendedWaitUntil:
    visible:
      id: "session_drawer_button"
    timeout: 30000
