appId: com.pocketagent.android
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: bootstrap-clean-start.yaml
- runFlow: dismiss-system-overlays.yaml
- extendedWaitUntil:
    notVisible:
      id: "onboarding_next"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      id: "onboarding_get_started"
    timeout: 15000
