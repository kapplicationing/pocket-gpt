appId: com.pocketagent.android
---
- runFlow: open-model-library.yaml
- tapOn: "Search models"
- eraseText
- inputText: "qwen3-0.6b-q4_k_m"
- hideKeyboard
- runFlow:
    when:
      visible:
        id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
        enabled: true
    commands:
      - tapOn:
          id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow:
          when:
            visible: "Large download on metered network"
          commands:
            - tapOn: "Continue download"
      - extendedWaitUntil:
          notVisible:
            id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
            enabled: true
          timeout: 300000
- runFlow:
    when:
      visible: "Queuing…"
    commands:
      - extendedWaitUntil:
          notVisible: "Queuing…"
          timeout: 300000
- runFlow:
    when:
      visible: "Pause"
    commands:
      - extendedWaitUntil:
          notVisible: "Pause"
          timeout: 300000
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- runFlow:
    when:
      visible: "Model library"
    commands:
      - scrollUntilVisible:
          element:
            text: "Downloaded models"
          direction: UP
          timeout: 20000
- runFlow:
    when:
      visible: "Refresh"
    commands:
      - tapOn: "Refresh"
- runFlow:
    when:
      visible:
        id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
        enabled: true
    commands:
      - tapOn:
          id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
- runFlow:
    when:
      visible:
        id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
        enabled: true
    commands:
      - tapOn:
          id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Model library"
    commands:
      - back
- extendedWaitUntil:
    visible:
      id: "composer_input"
    timeout: 180000
- extendedWaitUntil:
    notVisible:
      id: "chat_gate_inline_card"
    timeout: 180000
