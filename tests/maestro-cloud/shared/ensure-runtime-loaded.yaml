appId: com.pocketagent.android
---
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Retry"
    commands:
      - tapOn: "Retry"
- runFlow:
    when:
      visible: "Load"
    commands:
      - tapOn: "Load"
- runFlow:
    when:
      visible: "Setup"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- runFlow:
    when:
      visible: "Unloaded"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- runFlow:
    when:
      visible: "Retry"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- runFlow:
    when:
      visible: "Load"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- runFlow:
    when:
      visible: "Model library"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- runFlow:
    when:
      visible: "Model library"
    commands:
      - back
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- runFlow:
    when:
      visible: "Retry"
    commands:
      - tapOn: "Retry"
- runFlow:
    when:
      visible: "Load"
    commands:
      - tapOn: "Load"
- runFlow:
    when:
      visible: "Setup"
    commands:
      - runFlow: recover-runtime-from-model-library.yaml
- extendedWaitUntil:
    notVisible: "Setup"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Retry"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Refresh"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
      enabled: true
    timeout: 60000
