appId: com.pocketagent.android
---
- runFlow:
    when:
      visible:
        id: "unified_model_sheet"
    commands:
      - assertVisible:
          id: "unified_model_sheet"
- runFlow:
    when:
      notVisible:
        id: "unified_model_sheet"
    commands:
      - runFlow:
          when:
            visible:
              id: "open_model_library"
          commands:
            - tapOn:
                id: "open_model_library"
      - runFlow:
          when:
            visible: "More models…"
          commands:
            - tapOn: "More models…"
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
- extendedWaitUntil:
    visible:
      id: "unified_model_sheet"
    timeout: 30000
