appId: com.pocketagent.android
---
- runFlow:
    when:
      visible: "Model library"
    commands:
      - assertVisible: "Model library"
- runFlow:
    when:
      notVisible: "Model library"
    commands:
      - runFlow:
          when:
            visible: "Setup"
          commands:
            - tapOn:
                id: "send_button"
      - runFlow:
          when:
            visible: "Get ready"
          commands:
            - tapOn: "Get ready"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 20000
      - runFlow:
          when:
            visible:
              id: "open_model_library"
          commands:
            - tapOn:
                id: "open_model_library"
      - runFlow:
          when:
            visible: "More models…"
          commands:
            - tapOn: "More models…"
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
