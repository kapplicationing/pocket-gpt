appId: com.pocketagent.android
tags:
  - smoke
  - chat
  - send
  - maestro-default
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- takeScreenshot: "ui-04-chat-ready-empty-maestro"
- runFlow: shared/clear-composer-input.yaml
- inputText: "Reply with exactly: CORE_A_OK"
- takeScreenshot: "scenario-a-02-typed"
- tapOn:
    id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "Preparing response…"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "ui-05-chat-post-send-maestro"
