appId: com.pocketagent.android
tags:
  - recovery
  - model-management
  - maestro-default
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- assertNotVisible: "UI-STARTUP-001"
- tapOn:
    id: "session_drawer_button"
- extendedWaitUntil:
    visible:
      id: "create_session_button"
    timeout: 10000
- tapOn:
    id: "create_session_button"
- runFlow: shared/clear-composer-input.yaml
- inputText: "Reply with exactly: ACTIVATION_SMOKE_OK"
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
    timeout: 180000
- tapOn:
    id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "activation-send-smoke"
