appId: com.pocketagent.android
tags:
  - smoke
  - continuity
  - image
  - maestro-default
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- takeScreenshot: "ui-15-image-entry-visible-maestro"
- assertVisible: "Attach image"
- runFlow: shared/clear-composer-input.yaml
- inputText: "Reply with exactly: CORE_C_OK"
- tapOn:
    id: "send_button"
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-c-02-first-turn"
- takeScreenshot: "scenario-c-03-follow-up"
