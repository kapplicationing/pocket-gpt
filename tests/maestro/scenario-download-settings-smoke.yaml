appId: com.pocketagent.android
tags:
  - smoke
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-onboarding.yaml
- runFlow: shared/bootstrap-to-ready.yaml
- assertVisible:
    id: "composer_input"
- runFlow: shared/open-model-library.yaml
- assertVisible: "Model library"
- assertVisible: "Search models"
- assertVisible: "Downloaded models"
- assertVisible: "Refresh"
- scrollUntilVisible:
    element:
      text: "Close"
    direction: DOWN
    timeout: 20000
- assertVisible: "Close"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- takeScreenshot: "download-settings-smoke"
