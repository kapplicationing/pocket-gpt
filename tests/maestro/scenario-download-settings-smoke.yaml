appId: com.pocketagent.android
tags:
  - smoke
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - hideKeyboard
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Privacy first"
    commands:
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Get started"
    commands:
      - hideKeyboard
      - tapOn: "Get started"
- assertVisible: "Offline-first"
- runFlow: shared/open-model-library.yaml
- assertVisible: "Model library"
- assertVisible: "Search models"
- assertVisible: "Downloaded models"
- assertVisible: "Refresh"
- scrollUntilVisible:
    element:
      text: "Close"
    direction: DOWN
    timeout: 20000
- assertVisible: "Close"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- takeScreenshot: "download-settings-smoke"
