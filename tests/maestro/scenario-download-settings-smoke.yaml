appId: com.pocketagent.android
tags:
  - smoke
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - hideKeyboard
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Privacy first"
    commands:
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Get started"
    commands:
      - hideKeyboard
      - tapOn: "Get started"
- assertVisible: "Offline-first"
- tapOn:
    id: "advanced_sheet_button"
- extendedWaitUntil:
    visible: "Advanced controls"
    timeout: 20000
- assertVisible: "Downloads"
- assertVisible: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- takeScreenshot: "download-settings-smoke"
- scrollUntilVisible:
    element:
      text: "Open model library"
    direction: DOWN
    timeout: 20000
- assertVisible: "Open runtime controls"
- tapOn: "Open model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
- assertVisible: "Refresh all"
- assertVisible: "Downloaded models"
- assertVisible: "Available models"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- scrollUntilVisible:
    element:
      text: "Open runtime controls"
    direction: DOWN
    timeout: 20000
- tapOn: "Open runtime controls"
- extendedWaitUntil:
    visible: "Runtime model"
    timeout: 30000
- assertVisible: "Runtime load state"
- assertVisible: "No installed models yet"
- assertNotVisible: "Downloaded models"
- assertNotVisible: "Start download"
- tapOn: "Open model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
