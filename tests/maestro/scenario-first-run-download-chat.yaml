appId: com.pocketagent.android
tags:
  - lifecycle
  - provisioning
  - long-running
---
- launchApp:
    clearState: true
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-model-setup.yaml
- runFlow: shared/assert-post-onboarding-chat-surface.yaml
- runFlow: shared/ensure-runtime-loaded.yaml
- assertNotVisible: "UI-STARTUP-001"
- runFlow: shared/clear-composer-input.yaml
- inputText: "Reply with exactly: LIFECYCLE_OK"
- tapOn:
    id: "send_button"
- assertVisible: "Reply with exactly: LIFECYCLE_OK"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 600000
- extendedWaitUntil:
    visible:
      id: "message_bubble_assistant_complete"
    timeout: 600000
- assertVisible: "^LIFECYCLE_OK$"
- assertNotVisible: "UI-TOOL-SCHEMA-001"
- assertNotVisible:
    id: "message_bubble_assistant_pending"
- assertNotVisible:
    id: "message_bubble_assistant_streaming"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "first-run-download-chat-smoke"
