appId: com.pocketagent.android
tags:
  - lifecycle
  - provisioning
  - long-running
---
- launchApp:
    clearState: true
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-onboarding.yaml
- runFlow: shared/assert-post-onboarding-chat-surface.yaml
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
      - runFlow: shared/wait-runtime-transition-idle.yaml
- runFlow: shared/ensure-runtime-loaded.yaml
- assertNotVisible: "UI-STARTUP-001"
- runFlow: shared/clear-composer-input.yaml
- inputText: "download flow smoke"
- tapOn:
    id: "send_button"
- assertVisible: "download flow smoke"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 600000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "first-run-download-chat-smoke"
