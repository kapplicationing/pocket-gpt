appId: com.pocketagent.android
tags:
  - lifecycle
  - gpu
  - long-running
---
- launchApp:
    clearState: true
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/assert-post-onboarding-chat-surface.yaml
- runFlow: shared/bootstrap-launch-default-model.yaml
- runFlow: shared/ensure-runtime-loaded.yaml
- assertNotVisible: "UI-STARTUP-001"
- runFlow: shared/open-advanced-controls.yaml
- runFlow:
    when:
      visible: "Enable GPU acceleration"
    commands:
      - tapOn: "Enable GPU acceleration"
- runFlow:
    when:
      visible: "GPU acceleration unavailable on this build/device"
    commands:
      - assertVisible: "GPU acceleration unavailable on this build/device"
- runFlow:
    when:
      visible: "GPU acceleration unavailable ("
    commands:
      - assertVisible: "GPU acceleration unavailable ("
- back
- extendedWaitUntil:
    visible: "Send"
    timeout: 60000
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "gpu flow smoke"
- tapOn:
    id: "send_button"
- assertVisible: "gpu flow smoke"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 600000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "first-run-gpu-chat-smoke"
