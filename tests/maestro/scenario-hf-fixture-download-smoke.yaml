appId: com.pocketagent.android
tags:
  - fixture-hf
  - model-management
  - downloads
---
- runFlow: shared/open-model-library-debug-hf-candidate.yaml
- assertVisible: "fixture/tiny-gguf / tiny.gguf"
- scrollUntilVisible:
    element:
      id: "model_library_hf_queue_download"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_queue_download"
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- extendedWaitUntil:
    visible:
      id: "debug_model_library_task_present"
    timeout: 60000
- takeScreenshot: "hf-fixture-download-queued"
