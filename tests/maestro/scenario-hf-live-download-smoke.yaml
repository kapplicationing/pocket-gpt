appId: com.pocketagent.android
tags:
  - live-hf
  - long-running
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-onboarding.yaml
- runFlow: shared/open-model-library.yaml

- assertVisible: "Model library"
- assertVisible:
    id: "model_library_add_hugging_face"
- tapOn:
    id: "model_library_hf_url_input"
- eraseText
- inputText: "https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q4_K_M.gguf"
- hideKeyboard
- tapOn:
    id: "model_library_hf_check_url"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_candidate_card"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "model_library_hf_queue_download"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_queue_download"
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- scrollUntilVisible:
    element:
      text: "Download queue"
    direction: DOWN
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_pause"
    direction: DOWN
    timeout: 120000
- tapOn:
    id: "model_library_download_queue_pause"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_resume"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_resume"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_pause"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_cancel"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_retry"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_download_queue_retry"
- scrollUntilVisible:
    element:
      id: "model_library_download_queue_pause"
    direction: DOWN
    timeout: 120000
- extendedWaitUntil:
    notVisible:
      id: "model_library_download_queue_pause"
    timeout: 900000
- scrollUntilVisible:
    element:
      text: "unsloth/Qwen3-0.6B-GGUF / Qwen3-0.6B-Q4_K_M.gguf"
    direction: DOWN
    timeout: 60000
- assertVisible: "unsloth/Qwen3-0.6B-GGUF / Qwen3-0.6B-Q4_K_M.gguf"
- tapOn: "Load"
- extendedWaitUntil:
    visible: "Loaded"
    timeout: 180000
- takeScreenshot: "hf-live-download-loaded"
