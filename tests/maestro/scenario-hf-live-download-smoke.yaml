appId: com.pocketagent.android
tags:
  - live-hf
  - long-running
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-onboarding.yaml
- runFlow: shared/open-model-library.yaml
- runFlow: shared/open-model-library-advanced-sources.yaml

- assertVisible: "Model library"
- assertVisible:
    id: "model_library_add_hugging_face"
- tapOn:
    id: "model_library_hf_url_input"
- eraseText
- inputText: "https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q4_K_M.gguf"
- hideKeyboard
- tapOn:
    id: "model_library_hf_check_url"
- extendedWaitUntil:
    visible:
      id: "model_library_hf_candidate_card"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "model_library_hf_queue_download"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "model_library_hf_queue_download"
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- scrollUntilVisible:
    element:
      id: "model_library_tab_my_models"
    direction: UP
    timeout: 20000
- tapOn:
    id: "model_library_tab_my_models"
- scrollUntilVisible:
    element:
      text: "Download queue"
    direction: DOWN
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 120000
- tapOn: "Pause"
- scrollUntilVisible:
    element:
      text: "Resume"
    direction: DOWN
    timeout: 60000
- tapOn: "Resume"
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 60000
- tapOn: "Cancel"
- scrollUntilVisible:
    element:
      text: "Retry"
    direction: DOWN
    timeout: 60000
- tapOn: "Retry"
- scrollUntilVisible:
    element:
      text: "Pause"
    direction: DOWN
    timeout: 120000
- extendedWaitUntil:
    notVisible:
      text: "Pause"
    timeout: 900000
- scrollUntilVisible:
    element:
      id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
- extendedWaitUntil:
    visible:
      id: "composer_input"
    timeout: 180000
- assertNotVisible:
    id: "chat_gate_inline_card"
- takeScreenshot: "hf-live-download-loaded"
