appId: com.pocketagent.android
tags:
  - smoke
  - model-management
  - remove
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- runFlow: shared/open-model-library.yaml

- assertVisible: "Ready on this device"
- scrollUntilVisible:
    element:
      text: "Remove"
    direction: DOWN
    timeout: 20000

- tapOn: "Remove"
- extendedWaitUntil:
    visible: "Remove model?"
    timeout: 10000
- assertVisible: "Cancel"
- tapOn: "Remove"
- extendedWaitUntil:
    visible: "Undo"
    timeout: 10000
- extendedWaitUntil:
    notVisible: "Undo"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "model_library_tab_explore"
    direction: UP
    timeout: 20000
- tapOn:
    id: "model_library_tab_explore"
- scrollUntilVisible:
    element:
      text: "Available models"
    direction: DOWN
    timeout: 20000
- assertVisible: "Available models"
- scrollUntilVisible:
    element:
      text: "Download"
    direction: DOWN
    timeout: 20000
- assertVisible: "Download"
- takeScreenshot: "model-remove-redownload-after-remove"
