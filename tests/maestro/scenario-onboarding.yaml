appId: com.pocketagent.android
tags:
  - smoke
  - onboarding
  - bootstrap
  - maestro-default
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow: shared/bootstrap-clean-start.yaml
- runFlow: shared/complete-first-run-onboarding.yaml
- runFlow: shared/assert-post-onboarding-chat-surface.yaml
- assertNotVisible:
    text: "Next"
- assertNotVisible:
    id: "provisioning_bootstrap_loading"
- takeScreenshot: "scenario-onboarding-chat-surface"
