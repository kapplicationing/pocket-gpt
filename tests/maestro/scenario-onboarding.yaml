appId: com.pocketagent.android
tags:
  - smoke
  - onboarding
  - bootstrap
  - maestro-default
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- extendedWaitUntil:
    visible:
      id: "onboarding_next"
    timeout: 120000
- runFlow: shared/bootstrap-to-ready.yaml
- assertNotVisible:
    text: "Next"
- assertNotVisible: "UI-STARTUP-001"
- assertNotVisible:
    id: "provisioning_bootstrap_loading"
- assertVisible:
    id: "session_drawer_button"
- takeScreenshot: "scenario-onboarding-ready"
