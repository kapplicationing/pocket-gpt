appId: com.pocketagent.android
tags:
  - smoke
  - sessions
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 120000
- runFlow: shared/bootstrap-to-ready.yaml
- tapOn:
    id: "session_drawer_button"
- assertVisible: "Create session"
- assertVisible: "New chat"
- swipe:
    from:
      id: "session_row_active"
    direction: LEFT
- assertVisible: "Undo"
- assertVisible: "No sessions yet"
- tapOn: "Undo"
- assertVisible: "Create session"
- assertVisible: "New chat"
- takeScreenshot: "scenario-session-drawer-after-delete"
