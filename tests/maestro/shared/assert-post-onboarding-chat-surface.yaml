appId: com.pocketagent.android
---
- runFlow: dismiss-system-overlays.yaml
- extendedWaitUntil:
    notVisible:
      id: "onboarding_next"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      id: "onboarding_get_started"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "permission_allow_button"
    commands:
      - tapOn:
          id: "permission_allow_button"
- runFlow:
    when:
      visible: "Allow PocketAgent to send you notifications?"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible:
        id: "provisioning_bootstrap_loading"
    commands:
      - extendedWaitUntil:
          notVisible:
            id: "provisioning_bootstrap_loading"
          timeout: 30000
- runFlow:
    when:
      visible: "Preparing PocketAgent"
    commands:
      - extendedWaitUntil:
          notVisible: "Preparing PocketAgent"
          timeout: 60000
- runFlow:
    when:
      visible: "Model library"
    commands:
      - runFlow:
          when:
            visible: "Close"
          commands:
            - tapOn: "Close"
- runFlow:
    when:
      visible: "Model library"
    commands:
      - back
- extendedWaitUntil:
    visible:
      id: "session_drawer_button"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "send_button"
    timeout: 30000
- assertNotVisible: "Welcome"
- assertNotVisible: "UI-STARTUP-001"
