appId: com.pocketagent.android
---
- runFlow: dismiss-system-overlays.yaml
- hideKeyboard
- runFlow: dismiss-system-overlays.yaml
- runFlow:
    when:
      visible:
        id: "permission_allow_button"
    commands:
      - tapOn:
          id: "permission_allow_button"
- runFlow:
    when:
      visible: "Allow PocketAgent to send you notifications?"
      notVisible:
        id: "permission_allow_button"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        id: "onboarding_skip"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible:
        id: "onboarding_get_started"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible: "Get started"
      notVisible:
        id: "onboarding_get_started"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn: "Get started"
- runFlow: dismiss-system-overlays.yaml
- hideKeyboard
