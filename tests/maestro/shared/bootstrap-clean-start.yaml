appId: com.pocketagent.android
---
- runFlow: dismiss-system-overlays.yaml
- hideKeyboard
- runFlow: dismiss-system-overlays.yaml
- runFlow:
    when:
      visible:
        id: "permission_allow_button"
    commands:
      - tapOn:
          id: "permission_allow_button"
- runFlow:
    when:
      visible: "Allow PocketAgent to send you notifications?"
      notVisible:
        id: "permission_allow_button"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Next"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn: "Next"
- runFlow:
    when:
      visible: "Next"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn: "Next"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Get started"
    commands:
      - runFlow: dismiss-system-overlays.yaml
      - hideKeyboard
      - tapOn: "Get started"
- runFlow: dismiss-system-overlays.yaml
- hideKeyboard
