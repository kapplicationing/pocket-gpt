appId: com.pocketagent.android
---
- runFlow: open-model-library.yaml
- tapOn: "Search models"
- eraseText
- inputText: "qwen3-0.6b-q4_k_m"
- hideKeyboard
- runFlow:
    when:
      visible:
        id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
        enabled: true
    commands:
      - tapOn:
          id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow:
          when:
            visible: "Large download on metered network"
          commands:
            - tapOn: "Continue download"
      - extendedWaitUntil:
          notVisible:
            id: "model_library_download_qwen3-0.6b-q4_k_m_q4_k_m"
            enabled: true
          timeout: 300000
- runFlow:
    when:
      visible: "Queuing…"
    commands:
      - extendedWaitUntil:
          notVisible: "Queuing…"
          timeout: 300000
- runFlow:
    when:
      visible: "Pause"
    commands:
      - extendedWaitUntil:
          notVisible: "Pause"
          timeout: 300000
- runFlow:
    when:
      visible: "Large download on metered network"
    commands:
      - tapOn: "Continue download"
- runFlow:
    when:
      visible:
        id: "unified_model_sheet"
    commands:
      - runFlow:
          when:
            visible: "Refresh"
          commands:
            - tapOn: "Refresh"
      - runFlow:
          when:
            visible:
              id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
              enabled: true
          commands:
            - tapOn:
                id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow:
          when:
            visible:
              id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
              enabled: true
          commands:
            - tapOn:
                id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow: close-model-library-if-open.yaml
- runFlow:
    when:
      visible:
        id: "chat_gate_inline_card"
    commands:
      - tapOn:
          id: "send_button"
      - extendedWaitUntil:
          notVisible:
            id: "chat_gate_inline_card"
          timeout: 180000
- runFlow:
    when:
      visible:
        id: "chat_gate_inline_card"
    commands:
      - runFlow: open-model-library.yaml
      - tapOn: "Search models"
      - eraseText
      - inputText: "qwen3-0.6b-q4_k_m"
      - hideKeyboard
      - scrollUntilVisible:
          element:
            id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
          direction: DOWN
          timeout: 60000
      - runFlow:
          when:
            visible:
              id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
              enabled: true
          commands:
            - tapOn:
                id: "model_library_set_active_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow:
          when:
            visible:
              id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
              enabled: true
          commands:
            - tapOn:
                id: "model_library_load_qwen3-0.6b-q4_k_m_q4_k_m"
      - runFlow: close-model-library-if-open.yaml
- runFlow: close-model-library-if-open.yaml
- extendedWaitUntil:
    visible:
      id: "composer_input"
    timeout: 180000
- extendedWaitUntil:
    notVisible:
      id: "chat_gate_inline_card"
    timeout: 180000
