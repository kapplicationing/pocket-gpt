appId: com.pocketagent.android
---
- runFlow:
    when:
      visible:
        id: "onboarding_skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible:
        text: "Skip"
    commands:
      - tapOn:
          text: "Skip"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_next"
    commands:
      - tapOn:
          id: "onboarding_next"
- runFlow:
    when:
      visible:
        text: "Next"
    commands:
      - tapOn:
          text: "Next"
- runFlow:
    when:
      visible:
        id: "onboarding_get_started"
    commands:
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible:
        text: "Get started"
    commands:
      - tapOn:
          text: "Get started"
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- runFlow:
    when:
      visible: "Setup"
    commands:
      - runFlow:
          when:
            visible: "Get ready"
          commands:
            - tapOn: "Get ready"
      - runFlow:
          when:
            visible: "Load last used"
          commands:
            - tapOn: "Load last used"
      - runFlow:
          when:
            visible: "Setup"
          commands:
            - tapOn:
                id: "send_button"
      - runFlow:
          when:
            visible: "Load last used"
          commands:
            - tapOn: "Load last used"
      - runFlow:
          when:
            visible: "Setup"
          commands:
            - runFlow: open-model-library.yaml
      - runFlow:
          when:
            visible: "Load"
          commands:
            - tapOn: "Load"
- extendedWaitUntil:
    notVisible: "Setup"
    timeout: 180000
- runFlow: ensure-runtime-loaded.yaml
