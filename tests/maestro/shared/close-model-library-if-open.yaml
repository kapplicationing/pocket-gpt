appId: com.pocketagent.android
---
- runFlow:
    when:
      visible:
        id: "unified_model_sheet"
    commands:
      - runFlow:
          when:
            visible: "Close"
          commands:
            - tapOn: "Close"
            - extendedWaitUntil:
                notVisible:
                  id: "unified_model_sheet"
                timeout: 30000
      - runFlow:
          when:
            visible:
              id: "unified_model_sheet"
          commands:
            - back
            - extendedWaitUntil:
                notVisible:
                  id: "unified_model_sheet"
                timeout: 30000
