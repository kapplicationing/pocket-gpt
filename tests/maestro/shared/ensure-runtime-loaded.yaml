appId: com.pocketagent.android
---
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Unloaded"
    commands:
      - runFlow: open-model-library.yaml
      - runFlow:
          when:
            visible: "Model library"
          commands:
            - scrollUntilVisible:
                element:
                  text: "Downloaded models"
                direction: UP
                timeout: 20000
      - runFlow:
          when:
            visible: "Load last used"
          commands:
            - tapOn: "Load last used"
      - runFlow:
          when:
            visible: "Download default model"
          commands:
            - tapOn: "Download default model"
      - runFlow:
          when:
            visible: "Download"
          commands:
            - tapOn: "Download"
      - runFlow:
          when:
            visible: "Pause"
          commands:
            - extendedWaitUntil:
                notVisible: "Pause"
                timeout: 300000
      - runFlow:
          when:
            visible: "Refresh"
          commands:
            - tapOn: "Refresh"
      - runFlow:
          when:
            visible: "Model library"
          commands:
            - scrollUntilVisible:
                element:
                  text: "Downloaded models"
                direction: UP
                timeout: 20000
      - runFlow:
          when:
            visible: "Retry"
          commands:
            - tapOn: "Retry"
      - runFlow:
          when:
            visible: "Load"
          commands:
            - tapOn: "Load"
      - runFlow:
          when:
            visible: "Loaded"
          commands:
            - back
- runFlow:
    when:
      visible: "Model library"
    commands:
      - back
- runFlow:
    when:
      visible:
        id: "refresh_button"
    commands:
      - tapOn:
          id: "refresh_button"
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- extendedWaitUntil:
    notVisible: "Setup"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Retry"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Refresh"
    timeout: 180000
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
      enabled: true
    timeout: 60000
