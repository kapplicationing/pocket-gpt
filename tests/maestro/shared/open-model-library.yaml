appId: com.pocketagent.android
---
- runFlow:
    when:
      visible: "Model library"
    commands:
      - assertVisible: "Model library"
- assertNotVisible:
    id: "onboarding_next"
- assertNotVisible:
    id: "onboarding_get_started"
- runFlow:
    when:
      visible: "Setup"
    commands:
      - tapOn:
          id: "send_button"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 20000
- runFlow:
    when:
      visible:
        id: "composer_input"
    commands:
      - runFlow:
          when:
            visible: "More models…"
          commands:
            - tapOn: "More models…"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "More models..."
          commands:
            - tapOn: "More models..."
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible:
              id: "open_model_library"
          commands:
            - tapOn:
                id: "open_model_library"
            - runFlow:
                when:
                  visible: "More models…"
                commands:
                  - tapOn: "More models…"
                  - extendedWaitUntil:
                      visible: "Model library"
                      timeout: 5000
            - runFlow:
                when:
                  visible: "More models..."
                commands:
                  - tapOn: "More models..."
                  - extendedWaitUntil:
                      visible: "Model library"
                      timeout: 5000
            - runFlow:
                when:
                  visible: "Open model library"
                commands:
                  - tapOn: "Open model library"
                  - extendedWaitUntil:
                      visible: "Model library"
                      timeout: 5000
            - runFlow:
                when:
                  visible: "Fix model library"
                commands:
                  - tapOn: "Fix model library"
                  - extendedWaitUntil:
                      visible: "Model library"
                      timeout: 5000
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "More models…"
          commands:
            - tapOn: "More models…"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "More models..."
          commands:
            - tapOn: "More models..."
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "More models…"
          commands:
            - tapOn: "More models…"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
            - extendedWaitUntil:
                visible: "Model library"
                timeout: 5000
- runFlow:
    when:
      visible:
        id: "permission_allow_button"
    commands:
      - tapOn:
          id: "permission_allow_button"
- runFlow:
    when:
      visible: "Allow PocketAgent to send you notifications?"
      notVisible:
        id: "permission_allow_button"
    commands:
      - tapOn: "Allow"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
