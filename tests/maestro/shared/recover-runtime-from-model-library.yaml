appId: com.pocketagent.android
---
- runFlow:
    when:
      visible: "Unloaded"
    commands:
      - tapOn: "Unloaded"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 20000
- runFlow:
    when:
      visible: "Retry"
    commands:
      - tapOn: "Retry"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 20000
- runFlow:
    when:
      visible: "Load"
    commands:
      - tapOn: "Load"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 20000
- runFlow:
    when:
      visible: "Setup"
    commands:
      - tapOn:
          id: "send_button"
      - runFlow: bootstrap-launch-default-model.yaml
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
      - runFlow: bootstrap-launch-default-model.yaml
- runFlow:
    when:
      visible:
        id: "composer_input"
    commands:
      - runFlow: bootstrap-launch-default-model.yaml
- runFlow:
    when:
      visible:
        id: "unified_model_sheet"
    commands:
      - runFlow: close-model-library-if-open.yaml
      - runFlow: bootstrap-launch-default-model.yaml
- runFlow:
    when:
      visible: "Loaded"
    commands:
      - runFlow: close-model-library-if-open.yaml
